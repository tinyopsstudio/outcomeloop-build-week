name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm test
      - name: Check whether this version is already published
        id: package
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          published_version="$(npm view "${package_name}@${package_version}" version 2>/dev/null || true)"
          if [[ "$published_version" == "$package_version" ]]; then
            echo "publish_required=false" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is already published."
          else
            echo "publish_required=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish package
        if: steps.package.outputs.publish_required == 'true'
        run: npm publish --access public
