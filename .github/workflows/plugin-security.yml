name: Plugin Security Scan

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashgraph-online/ai-plugin-scanner-action@3debb48036bd5c261161bfc7df0d7e25a7d6299e # v1
        with:
          plugin_dir: "."
          fail_on_severity: high
