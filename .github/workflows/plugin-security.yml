name: Plugin Security Scan

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashgraph-online/ai-plugin-scanner-action@e7916cca3c5159750f8f8bd24fa6cc0c1f0a4d03 # v1
        with:
          plugin_dir: "."
          fail_on_severity: high
